version: '3.8'

services:
  mock_backend:
    build:
      context: .
      dockerfile: Dockerfile.mock_backend
    container_name: ai-mock-backend
    ports:
      - "8001:8001"
    networks:
      - ai-network

  ai_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BACKEND_BASE_URL=http://mock_backend:8001
      - API_KEY=${API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - mock_backend
    env_file:
      - .env
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge